{{- if .Values.configServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: spring-cloud-config-server
  labels:
    {{- include "java-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/name: spring-cloud-config-server
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.configServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: spring-cloud-config-server
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
