{{- if .Values.message.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: message
  labels:
    {{- include "java-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/name: message
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.message.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: message
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
