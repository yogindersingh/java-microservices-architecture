{{- if .Values.message.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-message
  labels:
    {{- include "java-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/name: message
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: message
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: message
          image: "{{ .Values.message.image.repository }}:{{ .Values.message.image.tag }}"
          imagePullPolicy: {{ .Values.message.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9011
              protocol: TCP
          env:
            - name: SPRING_RABBITMQ_HOST
              value: {{ .Values.message.env.springRabbitmqHost | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.message.resources | nindent 12 }}
{{- end }}
