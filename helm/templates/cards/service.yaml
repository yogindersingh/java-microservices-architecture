{{- if .Values.cards.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: cards
  labels:
    {{- include "java-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/name: cards
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.cards.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cards
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
