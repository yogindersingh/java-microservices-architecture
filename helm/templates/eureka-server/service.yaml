{{- if .Values.eurekaServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: spring-eureka-server
  labels:
    {{- include "java-microservices.labels" . | nindent 4 }}
    app.kubernetes.io/name: spring-eureka-server
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.eurekaServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: spring-eureka-server
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
