server:
  port: 9001

application:
  name: "@project.artifactId@"
  version: "@project.version@"

spring:
  application:
    name: "cards"
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      #default file value is schema.sql for schema and data.sql for datafile
      schema-locations: classpath:schemacustom.sql
  profiles:
    active: "qa"
  config:
    import: "configserver:http://localhost:8071"
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

management:
  endpoints:
    web:
      exposure:
        include: "*"