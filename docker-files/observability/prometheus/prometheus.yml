global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'accounts'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'accounts:8080' ]
  - job_name: 'loans'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'loans:8090' ]
  - job_name: 'cards'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'cards:9001' ]
  - job_name: 'spring-cloud-gateway-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'spring-cloud-gateway-server:8072' ]
  - job_name: 'spring-eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'spring-eureka-server:8070' ]
  - job_name: 'spring-cloud-config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'spring-cloud-config-server:8071' ]
