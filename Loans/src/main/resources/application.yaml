server:
  tomcat:
    threads:
      max: 50
  port: 8090

application:
  name: "@project.artifactId@"
  version: "@project.version@"

spring:
  application:
    name: "loans"
  datasource:
    username: root
    password: root@1234
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/loansDb?createDatabaseIfNotExist=true}
  jpa:
    show-sql: true
#  datasource:
#    url: jdbc:h2:mem:testdb
#    driverClassName: org.h2.Driver
#    username: sa
#    password: ''
#  h2:
#    console:
#      enabled: true
#  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
#    hibernate:
#      ddl-auto: update
#    show-sql: true
  sql:
    init:
      #default file value is schema.sql for schema and data.sql for datafile
      schema-locations: classpath:schemacustom.sql
      mode: always
  profiles:
    active: "default"
  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://localhost:8071}
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8070/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true
info:
  app:
    name: "loans"
    description: "Loans microservice"
    version: "@project.version@"