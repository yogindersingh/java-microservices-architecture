spring:
  application:
    name: spring-cloud-gateway-server
  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://localhost:8071}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          httpclient:
            connect-timeout: 1000
            response-timeout: 10s
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: password
      database: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWT_SET_URI:http://localhost:7080/realms/master/protocol/openid-connect/certs}

application:
  name: "@project.artifactId@"
  version: "@project.version@"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
    circuitbreakerevents:
      enabled: true
  info:
    env:
      enabled: true
info:
  app:
    name: "spring-cloud-gateway-server"
    description: "spring-cloud-gateway-server microservice"
    version: "@project.version@"

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state:
          seconds: 1

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"