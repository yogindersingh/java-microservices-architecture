spring:
  application:
    name: spring-cloud-config-server
  profiles:
    active: git
  #    active: native
  cloud:
    config:
      server:
        git:
          clone-on-start: true
          default-label: main
          force-pull: true
          timeout: 5
          uri: "https://github.com/yogindersingh/config-properties.git"
#        native:
#          search-locations: "classpath:/config"
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

server:
  port: 8071

application:
  name: "@project.artifactId@"
  version: "@project.version@"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"